name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Samba for WiFi Storage bundling
        run: brew install samba

      - run: npm ci

      - name: Bundle WiFi Storage tools
        env:
          BERRYBRIDGE_FORCE_SMB_BUNDLE: '1'
        run: node scripts/bundle-smb-tools.js

      - run: npm run build

      - name: Build macOS installers
        run: npx electron-builder --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cygwin/cygwin-install-action@v6
        with:
          packages: bash unzip
          install-dir: C:\cygwin64

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Bundle WiFi Storage tools
        env:
          BERRYBRIDGE_FORCE_SMB_BUNDLE: '1'
          BERRYBRIDGE_CYGWIN_ROOT: C:\cygwin64
        run: node scripts/bundle-smb-tools.js

      - run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.blockmap

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Samba for WiFi Storage bundling
        run: sudo apt-get update && sudo apt-get install -y smbclient

      - run: npm ci

      - name: Bundle WiFi Storage tools
        env:
          BERRYBRIDGE_FORCE_SMB_BUNDLE: '1'
        run: node scripts/bundle-smb-tools.js

      - run: npm run build

      - name: Build Linux packages
        run: npx electron-builder --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.blockmap

  publish:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten release files
        run: |
          mkdir -p release-upload
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.blockmap' \
          \) -exec cp {} release-upload/ \;
          ls -la release-upload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-upload/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
