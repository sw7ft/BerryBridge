name: RDP Presence Agent Release

on:
  push:
    tags:
      - 'rdp-presence-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: x64
          - goarch: '386'
            suffix: x86
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache-dependency-path: rdp-presence-agent/go.sum

      - name: Build standalone agent (${{ matrix.suffix }})
        working-directory: rdp-presence-agent
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          $version = "${{ github.ref_name }}" -replace '^rdp-presence-v',''
          if (-not $version) { $version = "1.0.0" }
          go mod tidy
          go build -ldflags="-s -w -X main.version=$version" -o "dist/RdpPresenceAgent-${{ matrix.suffix }}.exe" .

      - uses: actions/upload-artifact@v4
        with:
          name: rdp-presence-${{ matrix.suffix }}
          path: rdp-presence-agent/dist/*.exe

  publish:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten release files
        run: |
          mkdir -p release-upload
          find artifacts -name '*.exe' -exec cp {} release-upload/ \;
          ls -la release-upload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RDP Presence Agent ${{ github.ref_name }}
          body: |
            Standalone Windows agent — **no installer framework required**.

            1. Download `RdpPresenceAgent-x64.exe` (or `-x86` for 32-bit Windows).
            2. Double-click the file (accept the UAC prompt), or run as Administrator: `RdpPresenceAgent-x64.exe -install`
            3. The app copies itself to Program Files, registers a Windows service, and starts at boot.

            Uninstall: Windows Settings → Apps, or run `rdp-presence-agent.exe -uninstall` from the install folder.
          files: release-upload/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
